<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Lamborghini Roxo</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #0a0015;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
    }
    canvas {
      border: 1px solid #333;
      background: #0f001f;
      box-shadow: 0 0 50px #8b5cf688;
    }
    h2 {
      color: #c084fc;
      position: absolute;
      top: 30px;
      text-shadow: 0 0 20px #a855f7;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

<h2>Lamborghini Roxo – Estilo Aventador</h2>

<canvas id="canvas" width="860" height="440"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function drawLamborghini() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // sombra no chão
  ctx.fillStyle = "rgba(0,0,0,0.75)";
  ctx.beginPath();
  ctx.ellipse(430, 390, 220, 45, 0, 0, Math.PI*2);
  ctx.fill();

  // Corpo principal – roxo metálico agressivo
  ctx.fillStyle = "#7c3aed";         // roxo principal vibrante
  ctx.strokeStyle = "#5b21b6";
  ctx.lineWidth = 4;

  ctx.beginPath();
  ctx.moveTo(140, 260);
  ctx.quadraticCurveTo(80, 220, 60, 170);
  ctx.lineTo(70, 120);
  ctx.quadraticCurveTo(110, 60, 200, 50);
  ctx.lineTo(660, 50);
  ctx.quadraticCurveTo(740, 60, 800, 120);
  ctx.lineTo(800, 170);
  ctx.quadraticCurveTo(780, 220, 720, 260);
  ctx.lineTo(140, 260);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Reflexo / brilho metálico no teto e capô
  const shine = ctx.createLinearGradient(100, 40, 760, 240);
  shine.addColorStop(0,   "rgba(255,255,255,0.38)");
  shine.addColorStop(0.35,"rgba(255,255,255,0.12)");
  shine.addColorStop(0.55,"rgba(124,58,237,0.20)");
  shine.addColorStop(1,   "rgba(124,58,237,0.0)");

  ctx.fillStyle = shine;
  ctx.fill();

  // Recortes laterais agressivos (Y da Lamborghini)
  ctx.fillStyle = "#6d28d9";
  ctx.beginPath();
  ctx.moveTo(180, 260);
  ctx.lineTo(140, 340);
  ctx.lineTo(220, 355);
  ctx.lineTo(300, 340);
  ctx.lineTo(300, 260);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(680, 260);
  ctx.lineTo(720, 340);
  ctx.lineTo(640, 355);
  ctx.lineTo(560, 340);
  ctx.lineTo(560, 260);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Saia lateral baixa
  ctx.fillStyle = "#5b21b6";
  ctx.beginPath();
  ctx.moveTo(220, 340);
  ctx.lineTo(640, 340);
  ctx.lineTo(680, 370);
  ctx.lineTo(180, 370);
  ctx.closePath();
  ctx.fill();

  // Rodas grandes e agressivas
  function drawWheel(x, y, isFront = false) {
    // pneu
    ctx.fillStyle = "#0a0a0a";
    ctx.beginPath();
    ctx.arc(x, y, 68, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = "#1a1a1a";
    ctx.lineWidth = 16;
    ctx.stroke();

    // aro roxo com detalhes
    const wheelGrad = ctx.createRadialGradient(x-24, y-24, 8, x, y, 52);
    wheelGrad.addColorStop(0,   "#e9d5ff");
    wheelGrad.addColorStop(0.4, "#c084fc");
    wheelGrad.addColorStop(0.75,"#7c3aed");
    wheelGrad.addColorStop(1,   "#4c1d95");

    ctx.fillStyle = wheelGrad;
    ctx.beginPath();
    ctx.arc(x, y, 52, 0, Math.PI*2);
    ctx.fill();

    // detalhes do aro (estrelas / Y)
    ctx.strokeStyle = "#f3e8ff";
    ctx.lineWidth = 5;
    for(let i = 0; i < 5; i++){
      let ang = i * (Math.PI*2/5) + 0.2;
      ctx.beginPath();
      ctx.moveTo(x + Math.cos(ang)*22, y + Math.sin(ang)*22);
      ctx.lineTo(x + Math.cos(ang)*50, y + Math.sin(ang)*50);
      ctx.stroke();
    }
  }

  drawWheel(220, 340);   // dianteira esq
  drawWheel(640, 340);   // dianteira dir
  drawWheel(260, 340);   // traseira esq (mais larga)
  drawWheel(600, 340);   // traseira dir

  // Faróis afiados (LED diurno)
  ctx.fillStyle = "#e0f7fa";
  ctx.shadowColor = "#67e8f9";
  ctx.shadowBlur = 30;

  // farol esquerdo
  ctx.beginPath();
  ctx.moveTo(110, 130);
  ctx.lineTo(160, 100);
  ctx.lineTo(200, 105);
  ctx.lineTo(170, 140);
  ctx.closePath();
  ctx.fill();

  // farol direito
  ctx.beginPath();
  ctx.moveTo(750, 130);
  ctx.lineTo(700, 100);
  ctx.lineTo(660, 105);
  ctx.lineTo(690, 140);
  ctx.closePath();
  ctx.fill();

  ctx.shadowBlur = 0;

  // Aerofólio traseiro gigante
  ctx.fillStyle = "#4c1d95";
  ctx.beginPath();
  ctx.moveTo(320, 110);
  ctx.lineTo(540, 110);
  ctx.lineTo(580, 60);
  ctx.lineTo(280, 60);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // detalhe carbono no aerofólio
  ctx.fillStyle = "#1a1a1a";
  ctx.fillRect(330, 70, 200, 28);

  // Logo / texto
  ctx.font = "bold 52px Arial";
  ctx.fillStyle = "#f3e8ff";
  ctx.textAlign = "center";
  ctx.fillText("LAMBORGHINI", 430, 200);

  ctx.font = "28px Arial";
  ctx.fillStyle = "#c084fc";
  ctx.fillText("V12", 430, 245);
}

drawLamborghini();

  ctx.globalAlpha = 1;
  drawLamborghini();
  requestAnimationFrame(pulse);
}
// pulse();
*/
</script>
</body>
</html>
