function drawLamborghini() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // ------------------- sombra no chão -------------------
  ctx.fillStyle = "rgba(0,0,0,0.7)";
  // sombra no chão
  ctx.fillStyle = "rgba(0,0,0,0.75)";
  ctx.beginPath();
  ctx.ellipse(390, 375, 160, 35, 0, 0, Math.PI*2);
  ctx.ellipse(430, 390, 220, 45, 0, 0, Math.PI*2);
  ctx.fill();

  // Corpo principal (roxo metalizado)
  ctx.fillStyle = "#7b2cbf";         // roxo principal
  ctx.strokeStyle = "#4c1d95";
  ctx.lineWidth = 3;
  // Corpo principal – roxo metálico agressivo
  ctx.fillStyle = "#7c3aed";         // roxo principal vibrante
  ctx.strokeStyle = "#5b21b6";
  ctx.lineWidth = 4;

  ctx.beginPath();
  ctx.moveTo(120, 240);
  ctx.quadraticCurveTo(80, 220, 60, 180);
  ctx.lineTo(60, 140);
  ctx.quadraticCurveTo(90, 90, 160, 70);
  ctx.lineTo(620, 70);
  ctx.quadraticCurveTo(690, 90, 720, 140);
  ctx.lineTo(720, 180);
  ctx.quadraticCurveTo(700, 220, 660, 240);
  ctx.lineTo(120, 240);
  ctx.moveTo(140, 260);
  ctx.quadraticCurveTo(80, 220, 60, 170);
  ctx.lineTo(70, 120);
  ctx.quadraticCurveTo(110, 60, 200, 50);
  ctx.lineTo(660, 50);
  ctx.quadraticCurveTo(740, 60, 800, 120);
  ctx.lineTo(800, 170);
  ctx.quadraticCurveTo(780, 220, 720, 260);
  ctx.lineTo(140, 260);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Reflexo brilhante no capô (efeito metal)
  const grad = ctx.createLinearGradient(100, 80, 700, 220);
  grad.addColorStop(0, "rgba(255,255,255,0.35)");
  grad.addColorStop(0.4, "rgba(255,255,255,0.08)");
  grad.addColorStop(0.6, "rgba(123,44,191,0.15)");
  grad.addColorStop(1, "rgba(123,44,191,0.0)");
  // Reflexo / brilho metálico no teto e capô
  const shine = ctx.createLinearGradient(100, 40, 760, 240);
  shine.addColorStop(0,   "rgba(255,255,255,0.38)");
  shine.addColorStop(0.35,"rgba(255,255,255,0.12)");
  shine.addColorStop(0.55,"rgba(124,58,237,0.20)");
  shine.addColorStop(1,   "rgba(124,58,237,0.0)");

  ctx.fillStyle = grad;
  ctx.fillStyle = shine;
  ctx.fill();

  // ------------------- para-lamas dianteiros agressivos -------------------
  ctx.fillStyle = "#6b21a8";
  // Recortes laterais agressivos (Y da Lamborghini)
  ctx.fillStyle = "#6d28d9";
  ctx.beginPath();
  ctx.moveTo(100, 240);
  ctx.lineTo(80, 280);
  ctx.quadraticCurveTo(70, 310, 95, 335);
  ctx.lineTo(180, 340);
  ctx.lineTo(180, 240);
  ctx.moveTo(180, 260);
  ctx.lineTo(140, 340);
  ctx.lineTo(220, 355);
  ctx.lineTo(300, 340);
  ctx.lineTo(300, 260);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(680, 240);
  ctx.lineTo(700, 280);
  ctx.quadraticCurveTo(710, 310, 685, 335);
  ctx.lineTo(600, 340);
  ctx.lineTo(600, 240);
  ctx.moveTo(680, 260);
  ctx.lineTo(720, 340);
  ctx.lineTo(640, 355);
  ctx.lineTo(560, 340);
  ctx.lineTo(560, 260);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // ------------------- saias laterais -------------------
  ctx.fillStyle = "#5b1890";
  // Saia lateral baixa
  ctx.fillStyle = "#5b21b6";
  ctx.beginPath();
  ctx.moveTo(180, 300);
  ctx.lineTo(600, 300);
  ctx.lineTo(620, 340);
  ctx.lineTo(160, 340);
  ctx.moveTo(220, 340);
  ctx.lineTo(640, 340);
  ctx.lineTo(680, 370);
  ctx.lineTo(180, 370);
  ctx.closePath();
  ctx.fill();

  // ------------------- rodas -------------------
  function drawWheel(x, y) {
  // Rodas grandes e agressivas
  function drawWheel(x, y, isFront = false) {
    // pneu
    ctx.fillStyle = "#111";
    ctx.fillStyle = "#0a0a0a";
    ctx.beginPath();
    ctx.arc(x, y, 58, 0, Math.PI*2);
    ctx.arc(x, y, 68, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = "#222";
    ctx.lineWidth = 14;
    ctx.strokeStyle = "#1a1a1a";
    ctx.lineWidth = 16;
    ctx.stroke();

    // aro roxo brilhante
    const wheelGrad = ctx.createRadialGradient(x-18, y-18, 5, x, y, 42);
    wheelGrad.addColorStop(0, "#c084fc");
    wheelGrad.addColorStop(0.7, "#7b2cbf");
    wheelGrad.addColorStop(1, "#4c1d95");
    // aro roxo com detalhes
    const wheelGrad = ctx.createRadialGradient(x-24, y-24, 8, x, y, 52);
    wheelGrad.addColorStop(0,   "#e9d5ff");
    wheelGrad.addColorStop(0.4, "#c084fc");
    wheelGrad.addColorStop(0.75,"#7c3aed");
    wheelGrad.addColorStop(1,   "#4c1d95");

    ctx.fillStyle = wheelGrad;
    ctx.beginPath();
    ctx.arc(x, y, 42, 0, Math.PI*2);
    ctx.arc(x, y, 52, 0, Math.PI*2);
    ctx.fill();

    // detalhes do aro
    ctx.strokeStyle = "#e9d5ff";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(x, y, 30, 0, Math.PI*2);
    ctx.stroke();

    for(let i = 0; i < 10; i++){
      let ang = i * Math.PI / 5;
    // detalhes do aro (estrelas / Y)
    ctx.strokeStyle = "#f3e8ff";
    ctx.lineWidth = 5;
    for(let i = 0; i < 5; i++){
      let ang = i * (Math.PI*2/5) + 0.2;
      ctx.beginPath();
      ctx.moveTo(x + Math.cos(ang)*30, y + Math.sin(ang)*30);
      ctx.lineTo(x + Math.cos(ang)*42, y + Math.sin(ang)*42);
      ctx.moveTo(x + Math.cos(ang)*22, y + Math.sin(ang)*22);
      ctx.lineTo(x + Math.cos(ang)*50, y + Math.sin(ang)*50);
      ctx.stroke();
    }
  }

  drawWheel(180, 300);  // dianteira esquerda
  drawWheel(600, 300);  // dianteira direita
  drawWheel(220, 300);  // traseira esquerda (um pouco mais pra trás)
  drawWheel(560, 300);  // traseira direita
  drawWheel(220, 340);   // dianteira esq
  drawWheel(640, 340);   // dianteira dir
  drawWheel(260, 340);   // traseira esq (mais larga)
  drawWheel(600, 340);   // traseira dir

  // ------------------- faróis dianteiros (LED) -------------------
  ctx.fillStyle = "#e0f2fe";
  // Faróis afiados (LED diurno)
  ctx.fillStyle = "#e0f7fa";

  ctx.lineTo(165, 130);
  ctx.quadraticCurveTo(140, 145, 90, 140);
  ctx.moveTo(110, 130);
  ctx.lineTo(160, 100);
  ctx.lineTo(200, 105);
  ctx.lineTo(170, 140);
  ctx.closePath();
  ctx.fill();

  // farol direito
  ctx.beginPath();
  ctx.moveTo(690, 140);
  ctx.quadraticCurveTo(670, 125, 635, 120);
  ctx.lineTo(615, 130);
  ctx.quadraticCurveTo(640, 145, 690, 140);
  ctx.moveTo(750, 130);
  ctx.lineTo(700, 100);
  ctx.lineTo(660, 105);
  ctx.lineTo(690, 140);
  ctx.closePath();
  ctx.fill();

  ctx.shadowBlur = 0;

  // ------------------- aerofólio traseiro -------------------
  // Aerofólio traseiro gigante
  ctx.fillStyle = "#4c1d95";
  ctx.beginPath();
  ctx.moveTo(280, 110);
  ctx.lineTo(500, 110);
  ctx.lineTo(520, 80);
  ctx.lineTo(260, 80);
  ctx.moveTo(320, 110);
  ctx.lineTo(540, 110);
  ctx.lineTo(580, 60);
  ctx.lineTo(280, 60);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // detalhe carbono no aerofólio
  ctx.fillStyle = "#222";
  ctx.fillRect(290, 85, 200, 18);
  ctx.fillStyle = "#1a1a1a";
  ctx.fillRect(330, 70, 200, 28);

  // ------------------- texto GT-R -------------------
  ctx.font = "bold 38px Arial";
  ctx.fillStyle = "#e9d5ff";
  // Logo / texto
  ctx.font = "bold 52px Arial";
  ctx.fillStyle = "#f3e8ff";
  ctx.textAlign = "center";
  ctx.fillText("GT-R", 390, 195);
  ctx.fillText("LAMBORGHINI", 430, 200);

  ctx.font = "22px Arial";
  ctx.font = "28px Arial";
  ctx.fillStyle = "#c084fc";
  ctx.fillText("NISSAN", 390, 230);
  ctx.fillText("V12", 430, 245);
}

drawGTR();
drawLamborghini();
