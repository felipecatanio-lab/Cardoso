<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Nissan GT-R Roxo</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #0d001a;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, Helvetica, sans-serif;
    }
    canvas {
      border: 1px solid #444;
      background: #111;
      box-shadow: 0 0 40px #7b2cbf88;
    }
    h2 {
      color: #d5aaff;
      position: absolute;
      top: 30px;
      text-shadow: 0 0 15px #a855f7;
    }
  </style>
</head>
<body>

<h2>Nissan GT-R (R35) – Roxo</h2>

<canvas id="c" width="780" height="420"></canvas>

<script>
// Nissan GT-R roxo – versão estilizada 2D
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function drawGTR() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // ------------------- sombra no chão -------------------
  ctx.fillStyle = "rgba(0,0,0,0.7)";
  ctx.beginPath();
  ctx.ellipse(390, 375, 160, 35, 0, 0, Math.PI*2);
  ctx.fill();

  // Corpo principal (roxo metalizado)
  ctx.fillStyle = "#7b2cbf";         // roxo principal
  ctx.strokeStyle = "#4c1d95";
  ctx.lineWidth = 3;

  ctx.beginPath();
  ctx.moveTo(120, 240);
  ctx.quadraticCurveTo(80, 220, 60, 180);
  ctx.lineTo(60, 140);
  ctx.quadraticCurveTo(90, 90, 160, 70);
  ctx.lineTo(620, 70);
  ctx.quadraticCurveTo(690, 90, 720, 140);
  ctx.lineTo(720, 180);
  ctx.quadraticCurveTo(700, 220, 660, 240);
  ctx.lineTo(120, 240);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Reflexo brilhante no capô (efeito metal)
  const grad = ctx.createLinearGradient(100, 80, 700, 220);
  grad.addColorStop(0, "rgba(255,255,255,0.35)");
  grad.addColorStop(0.4, "rgba(255,255,255,0.08)");
  grad.addColorStop(0.6, "rgba(123,44,191,0.15)");
  grad.addColorStop(1, "rgba(123,44,191,0.0)");

  ctx.fillStyle = grad;
  ctx.fill();

  // ------------------- para-lamas dianteiros agressivos -------------------
  ctx.fillStyle = "#6b21a8";
  ctx.beginPath();
  ctx.moveTo(100, 240);
  ctx.lineTo(80, 280);
  ctx.quadraticCurveTo(70, 310, 95, 335);
  ctx.lineTo(180, 340);
  ctx.lineTo(180, 240);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(680, 240);
  ctx.lineTo(700, 280);
  ctx.quadraticCurveTo(710, 310, 685, 335);
  ctx.lineTo(600, 340);
  ctx.lineTo(600, 240);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // ------------------- saias laterais -------------------
  ctx.fillStyle = "#5b1890";
  ctx.beginPath();
  ctx.moveTo(180, 300);
  ctx.lineTo(600, 300);
  ctx.lineTo(620, 340);
  ctx.lineTo(160, 340);
  ctx.closePath();
  ctx.fill();

  // ------------------- rodas -------------------
  function drawWheel(x, y) {
    // pneu
    ctx.fillStyle = "#111";
    ctx.beginPath();
    ctx.arc(x, y, 58, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = "#222";
    ctx.lineWidth = 14;
    ctx.stroke();

    // aro roxo brilhante
    const wheelGrad = ctx.createRadialGradient(x-18, y-18, 5, x, y, 42);
    wheelGrad.addColorStop(0, "#c084fc");
    wheelGrad.addColorStop(0.7, "#7b2cbf");
    wheelGrad.addColorStop(1, "#4c1d95");

    ctx.fillStyle = wheelGrad;
    ctx.beginPath();
    ctx.arc(x, y, 42, 0, Math.PI*2);
    ctx.fill();

    // detalhes do aro
    ctx.strokeStyle = "#e9d5ff";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(x, y, 30, 0, Math.PI*2);
    ctx.stroke();

    for(let i = 0; i < 10; i++){
      let ang = i * Math.PI / 5;
      ctx.beginPath();
      ctx.moveTo(x + Math.cos(ang)*30, y + Math.sin(ang)*30);
      ctx.lineTo(x + Math.cos(ang)*42, y + Math.sin(ang)*42);
      ctx.stroke();
    }
  }

  drawWheel(180, 300);  // dianteira esquerda
  drawWheel(600, 300);  // dianteira direita
  drawWheel(220, 300);  // traseira esquerda (um pouco mais pra trás)
  drawWheel(560, 300);  // traseira direita

  // ------------------- faróis dianteiros (LED) -------------------
  ctx.fillStyle = "#e0f2fe";
  ctx.shadowColor = "#67e8f9";
  ctx.shadowBlur = 25;

  ctx.beginPath();
  ctx.moveTo(90, 140);
  ctx.quadraticCurveTo(110, 125, 145, 120);
  ctx.lineTo(165, 130);
  ctx.quadraticCurveTo(140, 145, 90, 140);
  ctx.closePath();
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(690, 140);
  ctx.quadraticCurveTo(670, 125, 635, 120);
  ctx.lineTo(615, 130);
  ctx.quadraticCurveTo(640, 145, 690, 140);
  ctx.closePath();
  ctx.fill();

  ctx.shadowBlur = 0;

  // ------------------- aerofólio traseiro -------------------
  ctx.fillStyle = "#4c1d95";
  ctx.beginPath();
  ctx.moveTo(280, 110);
  ctx.lineTo(500, 110);
  ctx.lineTo(520, 80);
  ctx.lineTo(260, 80);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // detalhe carbono no aerofólio
  ctx.fillStyle = "#222";
  ctx.fillRect(290, 85, 200, 18);

  // ------------------- texto GT-R -------------------
  ctx.font = "bold 38px Arial";
  ctx.fillStyle = "#e9d5ff";
  ctx.textAlign = "center";
  ctx.fillText("GT-R", 390, 195);

  ctx.font = "22px Arial";
  ctx.fillStyle = "#c084fc";
  ctx.fillText("NISSAN", 390, 230);
}

drawGTR();

// animação leve de brilho (opcional)
let time = 0;
function animate() {
  time += 0.015;
  ctx.globalAlpha = 0.08 + Math.sin(time) * 0.04;
  ctx.fillStyle = "#a855f7";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.globalAlpha = 1;
  drawGTR();
  requestAnimationFrame(animate);
}
// animate();   ← descomente se quiser o brilho pulsante
</script>
</body>
</html>
