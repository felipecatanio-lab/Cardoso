<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tênis Nike Realista - CSS 3D</title>
  <style>
    body {
      height: 100vh;
      margin: 0;
      background: radial-gradient(circle at 50% 30%, #222 0%, #000 70%);
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .scene {
      width: 100%;
      height: 100%;
      perspective: 1200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .shoe-container {
      position: relative;
      width: 420px;
      height: 280px;
      transform-style: preserve-3d;
      transform: rotateX(12deg) rotateY(-28deg) rotateZ(2deg);
      animation: float 12s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: rotateX(12deg) rotateY(-28deg) rotateZ(2deg) translateY(0); }
      50%     { transform: rotateX(14deg) rotateY(-32deg) rotateZ(1deg) translateY(-18px); }
    }

    .shoe {
      position: absolute;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
    }

    .part {
      position: absolute;
      background: #f8f8f8;
      border-radius: 18px;
      box-shadow: 
        inset 0 8px 14px rgba(255,255,255,0.7),
        inset 0 -8px 14px rgba(0,0,0,0.25),
        0 25px 50px rgba(0,0,0,0.6);
      backface-visibility: hidden;
    }

    /* Solado */
    .sole {
      width: 380px;
      height: 80px;
      bottom: 0;
      left: 20px;
      background: linear-gradient(135deg, #222 0%, #111 50%, #000 100%);
      border-radius: 40px 40px 18px 18px;
      transform: rotateX(-4deg);
      box-shadow: 0 30px 60px rgba(0,0,0,0.9);
    }

    .sole::before {
      content: "";
      position: absolute;
      inset: 8px;
      background: repeating-linear-gradient(45deg, #333 0, #333 8px, #222 8px, #222 16px);
      border-radius: 12px;
    }

    /* Cabedal principal (branco) */
    .upper {
      width: 340px;
      height: 180px;
      bottom: 60px;
      left: 40px;
      background: linear-gradient(to bottom, #fff 0%, #f0f0f0 100%);
      border-radius: 80px 100px 60px 40px;
      transform: rotateX(8deg);
    }

    /* Swoosh lateral */
    .swoosh {
      position: absolute;
      width: 260px;
      height: 80px;
      top: 60px;
      left: 40px;
      background: #000;
      border-radius: 50%;
      transform: rotate(-25deg) skewX(-8deg);
      clip-path: polygon(0% 40%, 100% 0%, 100% 60%, 0% 100%);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .swoosh.right {
      left: auto;
      right: 40px;
      transform: rotate(25deg) skewX(8deg);
    }

    /* Bico do tênis */
    .toe {
      width: 140px;
      height: 100px;
      bottom: 80px;
      left: 140px;
      background: #eee;
      border-radius: 60% 60% 40% 40%;
      transform: rotateX(15deg);
      box-shadow: inset 0 -10px 20px rgba(0,0,0,0.3);
    }

    /* Cadarços (simplificado) */
    .laces {
      position: absolute;
      inset: 40px 80px;
      background: repeating-linear-gradient(to right, 
        transparent 0 12px, #ddd 12px 20px, transparent 20px 32px);
      height: 8px;
      border-radius: 4px;
      transform: rotateX(30deg);
    }

    /* Iluminação ambiente giratória */
    .light {
      position: absolute;
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(255,240,180,0.15) 0%, transparent 60%);
      top: -300px;
      left: -200px;
      pointer-events: none;
      animation: lightRotate 20s linear infinite;
      transform-style: preserve-3d;
    }

    @keyframes lightRotate {
      to { transform: rotateY(360deg); }
    }

    h1 {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: #aaa;
      font-size: 1.1rem;
      letter-spacing: 4px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="scene">
    <div class="shoe-container">
      <div class="light"></div>

      <div class="shoe">
        <div class="part sole"></div>
        <div class="part upper"></div>
        <div class="part toe"></div>
        <div class="part swoosh"></div>
        <div class="part swoosh right"></div>
        <div class="part laces"></div>
      </div>
    </div>
  </div>

  <h1>Air Force 1 — CSS & JavaScript</h1>

  <script>
    // Leve movimento de mouse (opcional - mais realismo)
    const container = document.querySelector('.shoe-container');
    
    document.addEventListener('mousemove', e => {
      const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
      const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
      
      container.style.transform = `
        rotateX(${yAxis + 12}deg) 
        rotateY(${xAxis - 28}deg) 
        rotateZ(2deg)
      `;
    });
    
    // Volta à animação original quando mouse sai
    document.addEventListener('mouseleave', () => {
      container.style.transform = '';
      container.style.transition = 'transform 0.5s';
    });
  </script>

</body>
</html>
