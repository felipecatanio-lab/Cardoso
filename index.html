<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Camisa Brasil 2026</title>
  <style>
    body {
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #0d47a1 0%, #1565c0 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, Helvetica, sans-serif;
    }

    .container {
      position: relative;
      width: 380px;
      height: 520px;
    }

    .camisa {
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, #ffdd00 0%, #ffcc00 45%, #ffbb00 100%);
      border-radius: 60px 60px 100px 100px / 50px 50px 80px 80px;
      box-shadow: 
        0 30px 60px rgba(0,0,0,0.5),
        inset 0 15px 40px rgba(255,255,255,0.4),
        inset 0 -20px 50px rgba(0,0,0,0.15);
      overflow: hidden;
      position: relative;
    }

    /* Verde na gola e mangas */
    .camisa::before,
    .camisa::after {
      content: "";
      position: absolute;
      background: #009c3b;
      z-index: 1;
    }

    .camisa::before {  /* gola */
      width: 220px;
      height: 80px;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 50%;
      box-shadow: inset 0 10px 20px rgba(0,0,0,0.2);
    }

    .camisa::after {   /* detalhes mangas */
      width: 140px;
      height: 140px;
      border-radius: 50%;
      top: 60px;
      box-shadow: 0 0 30px rgba(0,0,0,0.3);
    }
    .camisa::after:nth-child(1) { left: -40px; }
    .camisa::after:nth-child(2) { right: -40px; }

    /* Listras verdes laterais sutis */
    .listras {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        100deg,
        transparent 0,
        transparent 40px,
        rgba(0,156,59,0.12) 40px,
        rgba(0,156,59,0.12) 60px
      );
      pointer-events: none;
    }

    /* Escudo central */
    .escudo {
      position: absolute;
      top: 110px;
      left: 50%;
      transform: translateX(-50%);
      width: 140px;
      height: 160px;
      background: linear-gradient(#005cb2, #003087);
      border-radius: 18px 18px 50% 50% / 20px 20px 60% 60%;
      border: 8px solid #fff;
      box-shadow: 
        0 10px 30px rgba(0,0,0,0.5),
        inset 0 8px 15px rgba(255,255,255,0.25);
      overflow: hidden;
    }

    .estrelas {
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(circle at 30% 35%, #ff0 2px, transparent 3px),
        radial-gradient(circle at 50% 28%, #ff0 2.5px, transparent 3.5px),
        radial-gradient(circle at 70% 40%, #ff0 2px, transparent 3px),
        radial-gradient(circle at 40% 55%, #ff0 2px, transparent 3px),
        radial-gradient(circle at 60% 60%, #ff0 2px, transparent 3px);
      background-size: 100% 100%;
    }

    .bola {
      position: absolute;
      width: 52px;
      height: 52px;
      background: #fff;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: inset 0 6px 12px rgba(0,0,0,0.3);
    }

    .bola::before {
      content: "";
      position: absolute;
      inset: 8px;
      background: #e30613;
      border-radius: 50%;
      box-shadow: inset 0 4px 8px rgba(0,0,0,0.4);
    }

    h1 {
      position: absolute;
      bottom: -60px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 2.1rem;
      text-shadow: 0 4px 12px rgba(0,0,0,0.7);
      margin: 0;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="camisa">
    <div class="listras"></div>
    <div class="escudo">
      <div class="estrelas"></div>
      <div class="bola"></div>
    </div>
  </div>
  <h1>BRASIL</h1>
</div>

</body>
</html>
